services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - backend
    restart: unless-stopped
