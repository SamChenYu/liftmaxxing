services:
  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    env_file: .env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
